name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify build output
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still points to dev source."
            exit 1
          fi
          if [ ! -d dist/assets ]; then
            echo "ERROR: dist/assets folder missing."
            exit 1
          fi

      - name: Deploy dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true
