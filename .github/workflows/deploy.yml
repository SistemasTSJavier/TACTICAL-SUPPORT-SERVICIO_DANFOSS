name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for /docs (main branch Pages)
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/docs/

      - name: Verify build output
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still points to dev source."
            exit 1
          fi
          if [ ! -d dist/assets ]; then
            echo "ERROR: dist/assets folder missing."
            exit 1
          fi

      - name: Publish build to main/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          target-folder: docs
          clean: false
          single-commit: true
          commit-message: 'chore: actualizar sitio en docs/ [skip ci]'

      - name: Build for gh-pages branch
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Publish build to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true
